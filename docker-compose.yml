version: '3.9'
services:
  python:
    container_name: monitoring-collection
    hostname: monitoring-collection
    restart: always
    image: python:3.12-slim
    ports:
      - "5000:5000"
    volumes:
      - .:/app:rw
    working_dir: /app
    command:
      - /bin/bash
      - -c
      - >
        echo "Installing dependencies..."
        && pip install --no-cache-dir -r requirements.txt
        && echo "Starting Flask application..."
        && python app.py
    environment:
      - DISPLAY=:99
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - FLASK_DEBUG=True
      - HOST=0.0.0.0
      - PORT=5000
networks:
  metanet1:
    driver: bridge
